version: '3.8'

services:
  iventoy:
    build:
      context: .
      args:
        - IVENTOY_VERSION=1.0.20
        - ARCH=amd64
    image: ghcr.io/thluozw/iventoy-docker:latest
    container_name: iventoy
    privileged: true
    network_mode: host
    volumes:
      - ./iso:/iventoy/iso
      - ./data:/iventoy/data
    environment:
      - TZ=Asia/Shanghai
      - IVENTOY_HTTP_PORT=16000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "16000"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
